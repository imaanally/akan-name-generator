<!DOCTYPE html>
<html lang="en">
<head>
    <title>Akan Name Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Akan Name Generator</h1>
        <p>Pop in your birthday, choose your gender, and let's find the Akan name connected to the day you were born.</p>
    </header>

    <main>
        <section>
            <h2>Enter Your Birthday Details</h2>
            <form>
                
                 <label for="day">Day</label>
                 <input type="number" id="day" placeholder="e.g. 24">
                 <label for="month">Month</label>
                 <input type="number" id="month" placeholder="e.g. 4">
                 <label for="year">Year</label>
                 <input type="number" id="year" placeholder="e.g. 2001">

                    <p>Gender</p>

                   <label>
                   <input type="radio" name="gender" value="male">
                        Male
                   </label>

                    <label>
                    <input type="radio" name="gender" value="female">
                        Female
                    </label>
                    <button type="submit">Find My Akan Name</button>
            </form> 
        </section>
        <section>
            <h2>Your Results</h2>
            <p>Your Akan name will appear here</p>
        </section>
    </main>

    <script src="script.js" defer></script>
</body>
</html>
